[tool.ruff] # Ruff se encarga de que tu código siga las buenas prácticas de estilo
# Configuración general

line-length = 100 # Define el número máximo de caracteres permitidos por línea
target-version = "py311" # Le indica a Ruff que tu código está diseñado para Python 3.11

[tool.ruff.lint] # Aquí defines qué errores o estilos debe buscar la herramienta
# Reglas de linting habilitadas (E = pycodestyle, F = Pyflakes, I = isort)

select = ["E", "F", "I", "N", "W"] # Selecciona las reglas de linting que deseas aplicar
ignore = [] # Ignora las reglas de linting que no deseas aplicar

[tool.ruff.lint.isort] # Aquí defines cómo quieres que Ruff ordene tus imports
# Orden automático de imports

known-first-party = ["app"] # Indica que el módulo app es parte de tu propio proyecto y no una librería externa

[tool.mypy] # Mypy se encarga de verificar los tipos de tus variables y funciones
# Archivos a analizar con mypy

files = ["app", "tests"] # Indica qué directorios debe analizar Mypy
ignore_missing_imports = true # Permite que Mypy ignore imports que no puede encontrar

# Recomendado para FastAPI

disallow_untyped_defs = false # Permite que Mypy ignore las definiciones de funciones y clases que no tienen tipos

